version: '3.0'
services:
  database:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: database
    user: root
    ports:
      - "1433:1433"
    volumes:
      - ./database/mssql_data:/var/opt/mssql/data
      - ./database/mssql_backup:/backup
    env_file: 
      - ./server/envs/prod.env
    networks:
      - global-net

  backend:
    build:
      context: ./server
      dockerfile: server.Dockerfile
    command: gunicorn apps.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - ./server:/usr/src/app/
    ports:
      - "8000:8000"
    env_file: './server/envs/prod.env'
    restart: always
    networks:
      - global-net

  # frontend:
  #   build:
  #     context: ./client
  #     dockerfile: client.prod.Dockerfile
  #   # command: npm run build
  #   # volumes:
  #   #   - ./client:/usr/src/frontend
  #   networks:
  #     - global-net
  #   depends_on:
  #     - backend

  # nginx:
  #   image: nginx:alpine
  #   restart: always
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
  #     - ./client/dist:/usr/share/nginx/html
  #   networks:
  #     - global-net
  #   depends_on:
  #     - backend

  nginx:
    build:
      context: ./client
      dockerfile: client.prod.Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - global-net

networks:
  global-net:
    driver: bridge