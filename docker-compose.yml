version: '3.0'
services:
  backend:
    build:
      context: ./server
      dockerfile: server.Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/usr/src/app/
    ports:
      - 0.0.0.0:8002:8000
    env_file: './server/envs/dev.env'
    restart: "always"
    networks:
      - global-net

networks:
  global-net:
