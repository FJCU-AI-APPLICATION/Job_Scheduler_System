services:
  database:
    image: postgres:16-alpine
    container_name: database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduler
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - global-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run uvicorn main:app --app-dir src --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/usr/src
    ports:
      - "8002:8000"
    env_file: ./backend/envs/dev.env
    restart: always
    depends_on:
      database:
        condition: service_healthy
    networks:
      - global-net

  ai-server:
    build:
      context: ./ai
      dockerfile: Dockerfile
    command: uv run uvicorn main:app --app-dir src --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai:/usr/src
    ports:
      - "8003:8001"
    restart: always
    networks:
      - global-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "cd /usr/src && uv sync --no-dev && cd src && uv run python main.py"
    environment:
      BACKEND_URL: http://backend:8000
      GRADIO_SERVER_NAME: 0.0.0.0
      PYTHONPATH: /usr/src/src
    volumes:
      - ./frontend:/usr/src
    ports:
      - "8080:7860"
    depends_on:
      - backend
    networks:
      - global-net

volumes:
  postgres_data:

networks:
  global-net:
