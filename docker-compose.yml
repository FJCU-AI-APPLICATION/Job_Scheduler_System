services:
  database:
    image: postgres:16-alpine
    container_name: database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduler
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - global-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-scheduler-system
    command: uv run uvicorn backend.main:app --app-dir src --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
      - /app/.venv
    ports:
      - "8002:8000"
    env_file: ./envs/dev.env
    restart: always
    depends_on:
      database:
        condition: service_healthy
    networks:
      - global-net

  ai-server:
    image: job-scheduler-system
    command: uv run uvicorn ai.main:app --app-dir src --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./:/app
      - /app/.venv
    ports:
      - "8003:8001"
    restart: always
    depends_on:
      - backend
    networks:
      - global-net

  frontend:
    image: job-scheduler-system
    command: uv run python -m frontend.main
    environment:
      BACKEND_URL: http://backend:8000
      GRADIO_SERVER_NAME: 0.0.0.0
    volumes:
      - ./:/app
      - /app/.venv
    ports:
      - "8080:7860"
    depends_on:
      - backend
    networks:
      - global-net

volumes:
  postgres_data:

networks:
  global-net:
