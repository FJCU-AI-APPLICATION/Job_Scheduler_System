version: '3.0'
services:
  database:
    #image: microsoft/mssql-server-linux
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: database
    user: root
    ports:
      - "1433:1433"
    volumes:
      - ./database/mssql_data:/var/opt/mssql/data
      - ./database/mssql_backup:/backup
    env_file: 
      - ./server/envs/dev.env
    networks:
      - global-net

  backend:
    build:
      context: ./server
      dockerfile: server.Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./server:/usr/src/app/
    ports:
      - "8002:8000"
    env_file: './server/envs/dev.env'
    restart: "always"
    networks:
      - global-net

  frontend:
    build:
      context: ./client
      dockerfile: client.Dockerfile
    # volumes:
    #   - ./client:/usr/src/frontend
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    networks:
      - global-net

  # ngrok-frontend:
  #   image: wernight/ngrok
  #   container_name: ngrok-frontend
  #   command: http frontend:8080
  #   ports:
  #     - "4041:4040" # ngrok Web UI for frontend
  #   environment:
  #     - NGROK_AUTHTOKEN=你的-ngrok-authtoken
  #   depends_on:
  #     - frontend
  #   networks:
  #     - global-net

networks:
  global-net:
    driver: bridge

