<!doctype html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <!--link rel="icon" type="image/svg+xml" href="/vite.svg" /-->
    <!--link rel="icon" href="/node_modules/bootstrap-icons/icons/calendar-range.svg"-->
    <link rel="stylesheet" href="css/styles.css"/>    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>班表查詢</title>
</head>

<body>
    <div id="app"></div>
    <div class="container">
        <div class="sidebar">
            <img sec="" alt="我是圖片">
            <div class="top-section">
                <ul>
                    <li><a href="#schedule-view" class="active">班表查詢</a></li>
                    <li><a href="#schedule-planning">排班</a></li>
                    <li><a href="#schedule-setting">設定</a></li>
                </ul>
            </div>
            <div class="bottom-section">
                <ul>
                    <li><a href="#">我的帳號</a></li>
                    <li><a href="#">登出</a></li>
                </ul>  
            </div>
        </div>

        <div class="main">
            <!-- 班表查詢 畫面-->
            <div id="schedule-view" class="active">
                <h1>班表查詢</h1>
                <div class="date-group">
                    <select class="year">
                        <option value="" disabled selected>年</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                    </select>
                    <select class="month">
                        <option value="" disabled selected>月</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>                        
                    </select>
                </div>
                <div class="query-group">
                    <div>
                        <label for="start-date">起始日期</label>
                        <input type="date" id="start-date">
                    </div>
                    <div>
                        <label for="end-date">結束日期</label>
                        <input type="date" id="end-date">
                    </div>
                    <button id="btn_search_schedule">查詢</button>
                    <button id="btn_export">匯出</button>
                </div>
                
                <div class="search-group">
                    <div class="table-wrapper">
                        <table id="scheduleTable">
                            <thead>
                                <tr></tr>
                            </thead>                    
                            <tbody>
                                <!---->
                            </tbody>
                        </table>         
                        <div class = "table-button_Schedule">
                            <span></span>
                            <button id="btnSchedule_prev">上一頁</button>
                            <button id="btnSchedule_next">下一頁</button>                
                        </div> 
                    </div>
                </div>
            </div>

            <!-- 排班 畫面 -->
            <div id="schedule-planning">
                <h1>排班</h1>
                <div class="date-group">
                    <label>時間</label>
                    <div class="date-input">
                        <div>
                            <label for="start-date">起始日期</label>
                            <input type="date" id="start-date">
                        </div>

                        <div>
                            <label for="end-date">結束日期</label>
                            <input type="date" id="end-date">
                        </div>

                        <button class="confirm">確認</button>
                    </div>
                </div>
                
                <div class="arrange-group">
                    <label>安排</label> 
                    <div class="arrange-input">
                        <div class="main-field">
                            <div class="member-field">
                                <label for="member">當前成員</label>
                                <div>
                                    <select id="member">
                                        <option>成員1</option>
                                        <option>成員2</option>
                                        <option>成員3</option>
                                    </select>
                                </div>
                            </div>
    
                            <div class="vacation-field">
                                <label for="vacation">休假選擇</label>
                                <div>
                                    <input type="text" id="vacation" placeholder="輸入休假類型">
                                    <button>選填</button>
                                </div>
                            </div>
    
                            <div class="checkbox-field">
                                <label>班別選擇</label>
                                <div>
                                    <label><input type="checkbox" value="first"> 第一班</label>
                                    <label><input type="checkbox" value="second"> 第二班</label>
                                    <label><input type="checkbox" value="third"> 第三班</label>
                                    <label><input type="checkbox" value="fourth"> 第四班</label>
                                    <label></label>
                                    <label></label>
                                    <label></label>
                                    <label></label>
                                </div>
                            </div>                                                        
                        </div>
                    </div>
                </div>

                <div class="additions-group">
                    <button class="cross">+</button>
                </div>

                <!-- 操作按鈕 -->
                <div class="actions-group">
                    <button class="btn_arrange">AI排班</button>
                    <button id="btn_export">匯出</button>
                </div>
            </div>

            <!-- 班表查詢 畫面-->
            <div id="schedule-setting">
                <h1>設定</h1>
                <div class="shiftSet-group">
                    <div class="title-field">班別設定</div>
                    <div class="table-field">
                        <table>
                            <thead>
                                <th>head</th>
                                <th>head</th>
                                <th>head</th>
                                <th>head</th>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>1</td>
                                    <td>1</td>
                                    <td>1</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="memberSet-group">
                    <div class="title-field">成員設定</div>
                    <div class="button-field">
                        <span></span>                        
                        <button id="btn_search_member">查詢</button>
                        <button id="btn_export">匯出</button>
                        <button id="btn_add">+新增成員</button>
                    </div>

                    <!-- 新增員工的彈出視窗 -->
                    <div id="addMemberModal" style="display:none;">
                        <div class="title-field">新增成員</div>            
                        <div class="modal-field">
                            <form id="addMemberForm">
                                <div class="form-item span-2">
                                    <label for="name">姓名:</label>
                                    <input type="text" id="name" name="name" required><br><br>
                                </div>
                                <div class="form-item span-2">
                                    <label for="age">年齡:</label>
                                    <input type="number" id="age" name="age" required><br><br>
                                </div>
                                <div class="form-item span-2">
                                    <label for="phone">電話:</label>
                                    <input type="text" id="phone" name="phone" required><br><br>
                                </div>
                                <div class="form-item span-2">
                                    <label for="identity">身份別:</label>
                                    <select id="identity" name="identity" required>
                                        <option value="FULL">正職</option>
                                        <option value="PART">兼職</option>
                                    </select>
                                </div>
                                <div class="form-item span-2">
                                    <label for="salary_type">薪別:</label>
                                    <select id="salary_type" name="salary_type" required>
                                        <option value="MONTH">月薪</option>
                                        <option value="HOUR">時薪</option>
                                    </select>
                                </div>
                                <div class="form-item span-2"></div>
                                <div class="form-item span-6 button-row">
                                    <span></span>
                                    <button type="submit" id="btn_submit">送出</button>
                                    <button type="button" id="btn_cancel">取消</button>
                                    <button type="reset" id="btn_reset">重設</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <div class="table-field">
                        <div class="table-wrapper">
                            <table id ="employeeTable">
                                <thead>
                                    <tr></tr>
                                </thead>                    
                                <tbody>
                                    <!---->
                                </tbody>
                            </table>
                        </div>
                        <div class = "table-button">
                            <span></span>
                            <button id="btn_prev">上一頁</button>
                            <button id="btn_next">下一頁</button>                
                        </div>
                    </div>       
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>    
</body>

</html>
